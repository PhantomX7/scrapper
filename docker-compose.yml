services:
  app:
    build: .
    restart: always
    ports:
      - "3050:3000"
    volumes:
      - app_data:/app/.data
    environment:
      - DATABASE_URL=/app/.data/taptalk.sqlite
      - WHATSAPP_API_URL=http://whatsapp:2777
      - WHATSAPP_API_USER=admin
      - WHATSAPP_API_PASS=q1w2e3r4
    depends_on:
      - whatsapp
    networks:
      - dokploy-network

  whatsapp:
    image: aldinokemal2104/go-whatsapp-web-multidevice:latest
    restart: always
    expose:
      - "2777"
    volumes:
      - whatsapp_data:/app/storages
    environment:
      - APP_PORT=2777
      - APP_DEBUG=false
      - APP_OS=Chrome
      - APP_BASIC_AUTH=admin:q1w2e3r4
      - APP_ACCOUNT_VALIDATION=false
      # Optional webhook
      # - WHATSAPP_WEBHOOK=https://your-webhook-url
      # - WHATSAPP_WEBHOOK_SECRET=your-secret
    command:
      - rest
    networks:
      - dokploy-network

volumes:
  app_data:
  whatsapp_data:

networks:
  dokploy-network:
    external: true
